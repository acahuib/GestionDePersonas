<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Permisos Oficiales - Control de Accesos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
 
<div class="main-content">
    <div class="container">
        <div class="page-header">
            <h2>🚪 Cuaderno de Permisos Oficiales de Personal</h2>
            <div class="header-actions">
                <a href="../../index.html">
                    <button class="btn-inline btn-secondary"><img src="/images/arrow-left.svg" class="icon-white"> Volver al Menú</button>
                </a>
                <a href="oficial_permisos_historial.html">
                    <button class="btn-inline btn-secondary"><img src="/images/book.svg" class="icon-white"> Ver historial</button>
                </a>
            </div>
        </div>

        <hr>

    <!-- FORMULARIO DE REGISTRO DE SALIDA -->
    <div class="form-card">
        <h3>Registrar Salida de Personal</h3>

        <label>DNI *</label>
        <input type="text" id="dni" placeholder="Ingrese DNI del personal" maxlength="8">

        <label>Nombre Completo <span class="muted">(Opcional si DNI ya está registrado)</span></label>
        <input type="text" id="nombreCompleto" placeholder="Nombres y apellidos del personal">

        <div id="persona-info" class="info-box" style="display: none; margin: 10px 0; padding: 10px; background: #e3f2fd; border-left: 4px solid #2196F3;">
            <strong><img src="/images/info-circle.svg"> Persona encontrada:</strong> <span id="persona-nombre"></span>
        </div>

        <label>De Dónde (Área de Trabajo) *</label>
        <input type="text" id="deDonde" placeholder="Ej: Mantenimiento, Operaciones, etc.">

        <label>Tipo de Permiso *</label>
        <input type="text" id="tipo" placeholder="Ej: Normal, Pernoctar, Comisión, etc.">

        <label>Quién Autoriza *</label>
        <input type="text" id="quienAutoriza" placeholder="Nombre de quien autoriza">

        <label>Hora de Salida</label>
        <input type="date" id="fechaSalida" placeholder="Fecha de salida">
        <input type="time" id="horaSalida" placeholder="Dejar vacío para usar hora actual">

        <label>Observación</label>
        <textarea id="observacion" placeholder="Observación (opcional)" rows="4"></textarea>

        <div>
            <button onclick="registrarSalida()" class="btn-danger btn-block">
                <img src="/images/check-lg.svg" class="icon-white"> Registrar SALIDA
            </button>
        </div>

        <p id="mensaje"></p>
    </div>

    <!-- LISTA DE PERSONAL ACTIVO (FUERA) -->
    <div>
        <div class="toolbar">
            <h3>Personal Fuera (Sin ingreso)</h3>
            <button onclick="cargarActivos()" class="btn-inline btn-small"><img src="/images/arrow-clockwise.svg" class="icon-white"> Actualizar</button>
        </div>
        
        <div id="lista-activos">
            <p class="text-center muted">Cargando...</p>
        </div>
    </div>

</div>

<script src="../../js/sidebar.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/activos_buscador.js"></script>
<script src="../../js/personas_autocomplete.js"></script>
<script src="../js/oficial_permisos.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    verificarAutenticacion();
    const hoy = (typeof fechaLocalIso === "function") ? fechaLocalIso() : new Date().toISOString().split("T")[0];
    const fechaSalida = document.getElementById("fechaSalida");
    if (fechaSalida) fechaSalida.value = hoy;
    cargarActivos();

    // Auto-actualizar lista cada 15 segundos
    setInterval(cargarActivos, 15000);

    // Si venimos de registrar ingreso, limpiar query y refrescar
    const params = new URLSearchParams(window.location.search);
    if (params.get("refresh") === "1") {
        cargarActivos();
        window.history.replaceState({}, document.title, "oficial_permisos.html");
    }

    // Detectar ENTER en los campos
    const dniInput = document.getElementById("dni");
    dniInput.addEventListener("blur", buscarPersonaPorDni);
    dniInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            buscarPersonaPorDni();
        }
    });
    
    addEnterListener("nombreCompleto", () => document.getElementById("deDonde").focus());
    addEnterListener("deDonde", () => document.getElementById("tipo").focus());
    addEnterListener("quienAutoriza", () => document.getElementById("horaSalida").focus());
    addEnterListener("horaSalida", registrarSalida);

    habilitarAutocompletePersona({
        dniId: "dni",
        nombreId: "nombreCompleto"
    });
});
</script>

</body>
</html>
