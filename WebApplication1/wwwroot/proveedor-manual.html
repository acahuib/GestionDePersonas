<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Tecnico - Registro Manual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f4f6;
            --card: #ffffff;
            --ink: #0f172a;
            --muted: #64748b;
            --accent: #0ea5e9;
            --accent-dark: #0284c7;
            --border: #e2e8f0;
            --warn: #f97316;
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #e0f2fe 0%, #f3f4f6 55%);
            color: var(--ink);
            margin: 0;
            padding: 28px 18px 40px;
        }
        .container {
            max-width: 980px;
            margin: auto;
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(15, 23, 42, 0.05);
        }
        h2 {
            margin: 0 0 8px;
            font-size: 26px;
            letter-spacing: -0.02em;
        }
        .subtitle { color: var(--muted); margin: 0 0 16px; }
        label { display:block; margin-top: 12px; font-weight: 600; }
        input, select, textarea, button {
            width: 100%;
            padding: 10px 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { outline: 2px solid rgba(14, 165, 233, 0.2); border-color: var(--accent); }
        textarea { min-height: 170px; font-family: "Consolas", "Courier New", monospace; }
        button {
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: var(--accent-dark); }
        .hint { color: var(--muted); font-size: 12px; margin-top: 6px; }
        .response {
            margin-top: 14px;
            white-space: pre-wrap;
            background: #f8fafc;
            border-radius: 10px;
            padding: 12px;
            border: 1px dashed var(--border);
        }
        .row { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .panel {
            margin-top: 16px;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #f8fafc;
        }
        .panel h3 { margin: 0 0 8px; font-size: 16px; }
        .actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 10px; }
        .actions button { background: #0f172a; }
        .actions button.secondary { background: #e2e8f0; color: #0f172a; }
        .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: #e0f2fe; color: #0369a1; font-size: 12px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; gap:10px; }
        .topbar-actions { display:flex; align-items:center; gap:8px; }
        .btn-users {
            width: auto;
            padding: 8px 12px;
            border-radius: 10px;
            background: #0f172a;
            color: #fff;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-users:hover { background: #1e293b; }
        .btn-logout {
            width: auto;
            padding: 8px 12px;
            border-radius: 10px;
            background: #ef4444;
            color: #fff;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-logout:hover { background: #dc2626; }
        .guide-list { display: grid; gap: 6px; margin: 0; padding-left: 18px; color: var(--muted); }
        .warn { color: var(--warn); font-weight: 600; }
        #simpleForm { display: grid; gap: 10px; margin-top: 10px; }
        .simple-field { display: grid; gap: 4px; }
        .simple-field label { margin: 0; font-weight: 600; }
        .simple-field input { margin-top: 0; }
        .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: #fee2e2; color: #b91c1c; font-size: 12px; }
        @media (max-width: 720px) { .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <h2>Modo Tecnico - Registro Manual</h2>
        <div class="topbar-actions">
            <button type="button" class="btn-users" onclick="window.location.href='/tecnico-usuarios.html'">Gestion de Usuarios</button>
            <button type="button" class="btn-logout" onclick="cerrarSesion()">Cerrar sesion</button>
        </div>
    </div>
    <p class="subtitle">Formulario rapido para cargar datos del cuaderno fisico sin pelear con el formato.</p>

    <form id="formManual">
        <div class="row">
            <div>
                <label>Tipo Operación</label>
                <select id="tipoOperacion" required>
                    <option value="Proveedor">Proveedor</option>
                    <option value="VehiculosProveedores">VehiculosProveedores</option>
                    <option value="VehiculoEmpresa">VehiculoEmpresa</option>
                    <option value="PersonalLocal">Cuaderno de Asistencia Personal de Mina</option>
                    <option value="SalidasPermisosPersonal">PermisosPersonal</option>
                    <option value="DiasLibre">DiasLibre</option>
                    <option value="HabitacionProveedor">HabitacionProveedor</option>
                    <option value="Ocurrencias">Ocurrencias</option>
                    <option value="ControlBienes">ControlBienes</option>
                    <option value="OficialPermisos">OficialPermisos</option>
                    <option value="RegistroInformativoEnseresTurno">RegistroInformativoEnseresTurno</option>
                </select>
            </div>
            <div>
                <label>Tipo Movimiento</label>
                <select id="tipoMovimiento" required>
                    <option value="Entrada">Entrada</option>
                    <option value="Salida">Salida</option>
                    <option value="Info">Info</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div>
                <label>DNI</label>
                <input id="dni" maxlength="8" list="dniSuggestions" required />
                <datalist id="dniSuggestions"></datalist>
                <div class="hint" id="dniHint"></div>
            </div>
            <div>
                <label>Fecha y Hora Manual</label>
                <input type="datetime-local" id="fechaHoraManual" required />
            </div>
        </div>

        <div class="row">
            <div>
                <label>Guardia (lista de usuarios)</label>
                <select id="guardiaUsuarioId" required>
                    <option value="">Cargando guardias...</option>
                </select>
                <div class="hint" id="guardiaHint">Selecciona el guardia al que se atribuirá guardiaIngreso/guardiaSalida.</div>
            </div>
        </div>

        <div class="row">
            <div>
                <label>Nombres</label>
                <input id="nombres" />
            </div>
            <div>
                <label>Apellidos</label>
                <input id="apellidos" />
            </div>
        </div>

        <div class="panel" id="modoEdicionPanel">
            <h3>Modo de edicion</h3>
            <div class="row">
                <label><input type="radio" name="modoEdicion" value="simple" checked /> Simple</label>
                <label><input type="radio" name="modoEdicion" value="avanzado" /> Avanzado (JSON)</label>
            </div>
            <div id="simpleForm"></div>
            <div class="hint" id="simpleNotes"></div>
        </div>

        <div id="jsonSection">
            <label>Datos JSON (editable según operacion)</label>
            <textarea id="datosJson" required></textarea>

            <div class="panel" id="jsonActionsPanel">
                <h3>Acciones rapidas</h3>
                <div class="actions">
                    <button type="button" id="btnResetTemplate">Restablecer plantilla</button>
                    <button type="button" id="btnFormatJson" class="secondary">Formatear JSON</button>
                    <button type="button" id="btnValidateJson" class="secondary">Validar JSON</button>
                    <button type="button" id="btnCopyJson" class="secondary">Copiar JSON</button>
                </div>
                <div class="hint" id="jsonStatus"></div>
            </div>
        </div>

        <div id="personalLocalPanel" style="display:none; margin-top:10px; padding:10px; border:1px solid #ddd; border-radius:6px; background:#fafafa;">
            <label style="margin-top:0;">Cuaderno de Asistencia Personal de Mina - Fechas/Horas (opcional)</label>
            <div class="row">
                <div>
                    <label>Hora Salida Almuerzo</label>
                    <input type="time" id="pl_horaSalidaAlmuerzo" />
                </div>
                <div>
                    <label>Fecha Salida Almuerzo</label>
                    <input type="date" id="pl_fechaSalidaAlmuerzo" />
                </div>
            </div>
            <div class="row">
                <div>
                    <label>Hora Entrada Almuerzo</label>
                    <input type="time" id="pl_horaEntradaAlmuerzo" />
                </div>
                <div>
                    <label>Fecha Entrada Almuerzo</label>
                    <input type="date" id="pl_fechaEntradaAlmuerzo" />
                </div>
            </div>
            <div class="hint">Si dejas campos vacíos, se enviarán como null.</div>
        </div>

        <div class="panel" id="guidePanel">
            <h3>Guia rapida</h3>
            <div class="badge" id="tipoBadge">Tipo: -</div>
            <p class="hint" id="tipoDescripcion"></p>
            <ul class="guide-list" id="tipoCampos"></ul>
        </div>

        <label>Observación</label>
        <textarea id="observacion"></textarea>

        <button type="submit">Registrar Manual</button>
    </form>

    <div class="response" id="response"></div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
const templates = {

    VehiculoEmpresa: { conductor: "", placa: "", kmSalida: null, kmIngreso: null, origenIngreso: "", destinoIngreso: "", origenSalida: "", destinoSalida: "" },
    PersonalLocal: { tipoPersonaLocal: "Normal", horaSalidaAlmuerzo: null, fechaSalidaAlmuerzo: null, horaEntradaAlmuerzo: null, fechaEntradaAlmuerzo: null },
    SalidasPermisosPersonal: { nombre: "", deDonde: "", personal: "", quienAutoriza: "", observaciones: "" },
    DiasLibre: { numeroBoleta: "", del: "", al: "", trabaja: "" },
    HabitacionProveedor: { origen: "", cuarto: "", frazadas: 0 },
    Ocurrencias: { nombre: "", ocurrencia: "" },
    ControlBienes: {
        bienes: [
            { descripcion: "Laptop", marca: "Lenovo", serie: null, cantidad: 1 }
        ],
        bienIds: []
    },
    OficialPermisos: { deDonde: "", tipo: "", quienAutoriza: "" },
    RegistroInformativoEnseresTurno: { turno: "", fecha: "", objetos: [{ nombre: "", cantidad: 1 }], observaciones: "" }
};

const guides = {
    Proveedor: {
        descripcion: "Entrada/salida de proveedores. Usa procedencia y destino.",
        campos: [
            { key: "procedencia", label: "procedencia" },
            { key: "destino", label: "destino" }
        ]
    },
    VehiculosProveedores: {
        descripcion: "Vehiculos de proveedores. Se recomienda placa y proveedor.",
        campos: [
            { key: "placa", label: "placa" },
            { key: "proveedor", label: "proveedor" },
            { key: "nombreApellidos", label: "nombreApellidos" },
            { key: "procedencia", label: "procedencia" },
            { key: "lote", label: "lote" },
            { key: "cantidad", label: "cantidad" }
        ]
    },
    VehiculoEmpresa: {
        descripcion: "Vehiculo de empresa. Controla km y origen/destino.",
        campos: [
            { key: "conductor", label: "conductor" },
            { key: "placa", label: "placa" },
            { key: "kmSalida", label: "kmSalida" },
            { key: "kmIngreso", label: "kmIngreso" },
            { key: "origenSalida", label: "origenSalida" },
            { key: "destinoSalida", label: "destinoSalida" }
        ]
    },
    PersonalLocal: {
        descripcion: "Personal local. Horarios de almuerzo van en el panel auxiliar.",
        campos: [
            { key: "tipoPersonaLocal", label: "tipoPersonaLocal" },
            { key: "horaSalidaAlmuerzo", label: "horaSalidaAlmuerzo (opcional)", optional: true },
            { key: "horaEntradaAlmuerzo", label: "horaEntradaAlmuerzo (opcional)", optional: true }
        ]
    },
    SalidasPermisosPersonal: {
        descripcion: "Permisos personales. Debe incluir autorizacion.",
        campos: [
            { key: "nombre", label: "nombre" },
            { key: "deDonde", label: "deDonde" },
            { key: "personal", label: "personal" },
            { key: "quienAutoriza", label: "quienAutoriza" },
            { key: "observaciones", label: "observaciones (opcional)", optional: true }
        ]
    },
    DiasLibre: {
        descripcion: "Dias libres. Completa boleta y fechas.",
        campos: [
            { key: "numeroBoleta", label: "numeroBoleta" },
            { key: "del", label: "del" },
            { key: "al", label: "al" },
            { key: "trabaja", label: "trabaja" }
        ]
    },
    HabitacionProveedor: {
        descripcion: "Uso de habitacion. Origen, cuarto y frazadas.",
        campos: [
            { key: "origen", label: "origen" },
            { key: "cuarto", label: "cuarto" },
            { key: "frazadas", label: "frazadas" }
        ]
    },
    Ocurrencias: {
        descripcion: "Ocurrencias generales. Texto de ocurrencia.",
        campos: [
            { key: "nombre", label: "nombre" },
            { key: "ocurrencia", label: "ocurrencia" }
        ]
    },
    ControlBienes: {
        descripcion: "Control de bienes. Lista de bienes y cantidades.",
        campos: [
            { key: "bienes", label: "bienes[]" },
            { key: "descripcion", label: "descripcion" },
            { key: "marca", label: "marca" },
            { key: "serie", label: "serie" },
            { key: "cantidad", label: "cantidad" }
        ]
    },
    OficialPermisos: {
        descripcion: "Permisos oficiales. Origen y autorizacion.",
        campos: [
            { key: "deDonde", label: "deDonde" },

            { key: "quienAutoriza", label: "quienAutoriza" }
        ]
    },
    RegistroInformativoEnseresTurno: {
        descripcion: "Enseres por turno. Turno, fecha y objetos.",
        campos: [
            { key: "turno", label: "turno" },
            { key: "fecha", label: "fecha" },
            { key: "objetos", label: "objetos[]" },
            { key: "observaciones", label: "observaciones (opcional)", optional: true }
        ]
    }
};

const tipoOperacionInput = document.getElementById("tipoOperacion");
const tipoMovimientoInput = document.getElementById("tipoMovimiento");
const datosJsonInput = document.getElementById("datosJson");
const dniInput = document.getElementById("dni");
const nombresInput = document.getElementById("nombres");
const apellidosInput = document.getElementById("apellidos");
const guardiaUsuarioIdInput = document.getElementById("guardiaUsuarioId");
const guardiaHint = document.getElementById("guardiaHint");
const dniHint = document.getElementById("dniHint");
const personalLocalPanel = document.getElementById("personalLocalPanel");
const dniSuggestions = document.getElementById("dniSuggestions");
const simpleForm = document.getElementById("simpleForm");
const simpleNotes = document.getElementById("simpleNotes");
const jsonSection = document.getElementById("jsonSection");
const modoEdicionRadios = document.querySelectorAll("input[name='modoEdicion']");
const jsonStatus = document.getElementById("jsonStatus");
const tipoBadge = document.getElementById("tipoBadge");
const tipoDescripcion = document.getElementById("tipoDescripcion");
const tipoCampos = document.getElementById("tipoCampos");
const btnResetTemplate = document.getElementById("btnResetTemplate");
const btnFormatJson = document.getElementById("btnFormatJson");
const btnValidateJson = document.getElementById("btnValidateJson");
const btnCopyJson = document.getElementById("btnCopyJson");
const fechaHoraManualInput = document.getElementById("fechaHoraManual");

let dniExiste = null;
let ultimoMovimiento = null;
let modoEdicion = "simple";
let debounceDni = null;

const plFields = {
    horaSalidaAlmuerzo: document.getElementById("pl_horaSalidaAlmuerzo"),
    fechaSalidaAlmuerzo: document.getElementById("pl_fechaSalidaAlmuerzo"),
    horaEntradaAlmuerzo: document.getElementById("pl_horaEntradaAlmuerzo"),
    fechaEntradaAlmuerzo: document.getElementById("pl_fechaEntradaAlmuerzo")
};

function dateToIsoDateStart(dateValue) {
    if (!dateValue) return null;
    return `${dateValue}T00:00:00`;
}

function timeWithDateToIso(timeValue, dateValue) {
    if (!timeValue) return null;
    const baseDate = dateValue || new Date().toISOString().slice(0, 10);
    return `${baseDate}T${timeValue}:00`;
}

function isoToDatetimeLocal(value) {
    if (!value) return "";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return "";
    const pad = (n) => n.toString().padStart(2, "0");
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function isoToDate(value) {
    if (!value) return "";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return "";
    const pad = (n) => n.toString().padStart(2, "0");
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
}

function isoToTime(value) {
    if (!value) return "";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return "";
    const pad = (n) => n.toString().padStart(2, "0");
    return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function setJsonStatus(message, isWarn) {
    jsonStatus.textContent = message || "";
    jsonStatus.className = isWarn ? "hint warn" : "hint";
}

function tryParseJson() {
    try {
        const data = JSON.parse(datosJsonInput.value || "{}");
        return { ok: true, data };
    } catch (error) {
        return { ok: false, error };
    }
}

function normalizarDni(valor) {
    return (valor || "").replace(/\D/g, "").trim();
}

function setDniHint(texto, isWarn) {
    dniHint.textContent = texto || "";
    dniHint.className = isWarn ? "hint warn" : "hint";
}

function setGuardiaHint(texto, isWarn) {
    guardiaHint.textContent = texto || "";
    guardiaHint.className = isWarn ? "hint warn" : "hint";
}

async function cargarGuardiasModoTecnico() {
    const response = await fetchAuth(`${API_BASE}/salidas/modo-tecnico/guardias`);
    if (!response || !response.ok) {
        guardiaUsuarioIdInput.innerHTML = '<option value="">No se pudo cargar guardias</option>';
        setGuardiaHint("No se pudo cargar la lista de guardias.", true);
        return;
    }

    const guardias = await response.json();
    if (!Array.isArray(guardias) || guardias.length === 0) {
        guardiaUsuarioIdInput.innerHTML = '<option value="">No hay guardias activos</option>';
        setGuardiaHint("No se encontraron usuarios con rol Guardia activos.", true);
        return;
    }

    guardiaUsuarioIdInput.innerHTML = [
        '<option value="">Seleccione un guardia...</option>',
        ...guardias.map(g => {
            const extra = [g.usuarioLogin, g.dni].filter(Boolean).join(" | ");
            const label = extra ? `${g.nombreCompleto} (${extra})` : g.nombreCompleto;
            return `<option value="${g.id}">${label}</option>`;
        })
    ].join("");

    setGuardiaHint("Selecciona el guardia que quedará en guardiaIngreso/guardiaSalida.");
}

function formatearFechaHora(valor) {
    if (!valor) return "-";
    const date = new Date(valor);
    if (Number.isNaN(date.getTime())) return "-";
    const pad = (n) => n.toString().padStart(2, "0");
    return `${pad(date.getDate())}/${pad(date.getMonth() + 1)}/${date.getFullYear()} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

async function cargarUltimoMovimiento(dni) {
    ultimoMovimiento = null;
    const resp = await fetchAuth(`${API_BASE}/consultas/ultimo-movimiento/${dni}`);
    if (!resp) return;
    if (resp.ok) {
        ultimoMovimiento = await resp.json();
        const fechaTexto = formatearFechaHora(ultimoMovimiento.fechaHora);
        setDniHint(`Ultimo movimiento: ${ultimoMovimiento.tipoMovimiento} (${fechaTexto})`);
        return;
    }

    const mensaje = await readApiError(resp);
    setDniHint(mensaje, true);
}

function getSimpleFields(tipo) {
    const template = templates[tipo] ?? {};
    const fields = [];
    const complex = [];
    const hiddenKeys = new Set(["guardiaIngreso", "guardiaSalida"]);

    Object.entries(template).forEach(([key, value]) => {
        if (hiddenKeys.has(key)) {
            return;
        }

        if (Array.isArray(value) || (value && typeof value === "object")) {
            complex.push(key);
            return;
        }

        fields.push({
            key,
            type: typeof value === "number" ? "number" : "text"
        });
    });

    return { fields, complex };
}

function renderSimpleForm() {
    const tipo = tipoOperacionInput.value;
    const { fields, complex } = getSimpleFields(tipo);
    simpleForm.innerHTML = "";

    if (fields.length === 0) {
        simpleForm.innerHTML = "<div class='hint'>Este tipo usa JSON complejo. Usa modo avanzado.</div>";
    }

    fields.forEach((field) => {
        const wrapper = document.createElement("div");
        wrapper.className = "simple-field";

        const label = document.createElement("label");
        label.textContent = field.key;

        const input = document.createElement("input");
        input.type = field.type;
        input.dataset.key = field.key;
        input.addEventListener("input", () => syncSimpleToJson(field.key, input.value, field.type));

        wrapper.appendChild(label);
        wrapper.appendChild(input);
        simpleForm.appendChild(wrapper);
    });

    simpleNotes.textContent = complex.length
        ? `Campos complejos en JSON: ${complex.join(", ")}.`
        : "";

    syncJsonToSimple();
}

function syncSimpleToJson(key, value, type) {
    const parsed = tryParseJson();
    const data = parsed.ok ? parsed.data : (templates[tipoOperacionInput.value] ?? {});
    const normalized = type === "number" && value !== "" ? Number(value) : (value || "");
    data[key] = normalized === "" ? null : normalized;
    datosJsonInput.value = JSON.stringify(data, null, 2);
    if (tipoOperacionInput.value === "PersonalLocal") {
        syncJsonToPersonalLocalInputs();
    }
}

function syncJsonToSimple() {
    if (modoEdicion !== "simple") return;
    const parsed = tryParseJson();
    if (!parsed.ok) return;
    const data = parsed.data || {};

    simpleForm.querySelectorAll("input[data-key]").forEach((input) => {
        const key = input.dataset.key;
        const value = data[key];
        input.value = value === null || value === undefined ? "" : String(value);
    });
}

function setModoEdicion(valor) {
    modoEdicion = valor;
    jsonSection.style.display = modoEdicion === "avanzado" ? "block" : "none";
    simpleForm.style.display = modoEdicion === "avanzado" ? "none" : "grid";
    simpleNotes.style.display = modoEdicion === "avanzado" ? "none" : "block";
    renderSimpleForm();
}

function updateGuide() {
    const tipo = tipoOperacionInput.value;
    const guide = guides[tipo];
    tipoBadge.textContent = `Tipo: ${tipo}`;
    tipoDescripcion.textContent = guide?.descripcion || "";
    tipoCampos.innerHTML = "";

    if (!guide) return;

    guide.campos.forEach((campo) => {
        const li = document.createElement("li");
        li.textContent = campo.label;
        if (campo.optional) li.classList.add("hint");
        tipoCampos.appendChild(li);
    });
}

function formatJson() {
    const parsed = tryParseJson();
    if (!parsed.ok) {
        setJsonStatus("JSON invalido. Revisa comas y llaves.", true);
        return false;
    }
    datosJsonInput.value = JSON.stringify(parsed.data, null, 2);
    setJsonStatus("JSON formateado.");
    return true;
}

function validateJson() {
    const parsed = tryParseJson();
    if (!parsed.ok) {
        setJsonStatus("JSON invalido. Revisa comas y llaves.", true);
        return false;
    }

    const tipo = tipoOperacionInput.value;
    const guide = guides[tipo];
    if (!guide) {
        setJsonStatus("JSON valido.");
        return true;
    }

    const missing = [];
    guide.campos.forEach((campo) => {
        if (campo.optional) return;
        const key = campo.key;
        const value = parsed.data?.[key];
        if (value === undefined || value === null || value === "") {
            missing.push(campo.label);
        }
    });

    if (missing.length) {
        setJsonStatus(`Faltan campos en JSON: ${missing.join(", ")}`, true);
        return false;
    }

    setJsonStatus("JSON valido y con campos clave.");
    return true;
}

async function copyJson() {
    const parsed = tryParseJson();
    if (!parsed.ok) {
        setJsonStatus("JSON invalido. No se puede copiar.", true);
        return;
    }
    try {
        await navigator.clipboard.writeText(JSON.stringify(parsed.data, null, 2));
        setJsonStatus("JSON copiado al portapapeles.");
    } catch {
        setJsonStatus("No se pudo copiar el JSON.", true);
    }
}

function syncPersonalLocalInputsToJson() {
    if (tipoOperacionInput.value !== "PersonalLocal") return;
    let jsonData = {};
    try {
        jsonData = JSON.parse(datosJsonInput.value || "{}");
    } catch {
        jsonData = {};
    }

    jsonData.horaSalidaAlmuerzo = timeWithDateToIso(plFields.horaSalidaAlmuerzo.value, plFields.fechaSalidaAlmuerzo.value);
    jsonData.fechaSalidaAlmuerzo = dateToIsoDateStart(plFields.fechaSalidaAlmuerzo.value);
    jsonData.horaEntradaAlmuerzo = timeWithDateToIso(plFields.horaEntradaAlmuerzo.value, plFields.fechaEntradaAlmuerzo.value);
    jsonData.fechaEntradaAlmuerzo = dateToIsoDateStart(plFields.fechaEntradaAlmuerzo.value);

    datosJsonInput.value = JSON.stringify(jsonData, null, 2);
}

function syncJsonToPersonalLocalInputs() {
    if (tipoOperacionInput.value !== "PersonalLocal") return;
    let jsonData = {};
    try {
        jsonData = JSON.parse(datosJsonInput.value || "{}");
    } catch {
        jsonData = {};
    }

    plFields.horaSalidaAlmuerzo.value = isoToTime(jsonData.horaSalidaAlmuerzo);
    plFields.fechaSalidaAlmuerzo.value = isoToDate(jsonData.fechaSalidaAlmuerzo);
    plFields.horaEntradaAlmuerzo.value = isoToTime(jsonData.horaEntradaAlmuerzo);
    plFields.fechaEntradaAlmuerzo.value = isoToDate(jsonData.fechaEntradaAlmuerzo);
}

function refreshTemplate() {
    const tipo = tipoOperacionInput.value;
    let template = templates[tipo] ?? {};

    if (tipo === "RegistroInformativoEnseresTurno") {
        const today = new Date().toISOString().slice(0, 10);
        template = { ...template, fecha: `${today}T00:00:00` };
    }

    datosJsonInput.value = JSON.stringify(template, null, 2);
    personalLocalPanel.style.display = tipo === "PersonalLocal" ? "block" : "none";

    if (tipo === "DiasLibre") {
        tipoMovimientoInput.value = "Salida";
        tipoMovimientoInput.disabled = true;
    } else if (tipo === "RegistroInformativoEnseresTurno") {
        tipoMovimientoInput.value = "Info";
        tipoMovimientoInput.disabled = true;
    } else {
        tipoMovimientoInput.disabled = false;
    }

    if (tipo === "PersonalLocal") {
        syncJsonToPersonalLocalInputs();
    }

    updateGuide();
    setJsonStatus("Plantilla cargada.");
    renderSimpleForm();
}

function setNamesLocked(locked) {
    nombresInput.disabled = locked;
    apellidosInput.disabled = locked;
    nombresInput.required = !locked;
    apellidosInput.required = !locked;
}

function setDefaultFechaHora() {
    if (!fechaHoraManualInput.value) {
        const now = new Date();
        const pad = (n) => n.toString().padStart(2, "0");
        const value = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
        fechaHoraManualInput.value = value;
    }
}

function validarFechaHoraManual() {
    const valor = fechaHoraManualInput.value;
    if (!valor) return { ok: false, mensaje: "Fecha y hora manual es requerida." };

    const fecha = new Date(valor);
    if (Number.isNaN(fecha.getTime()))
        return { ok: false, mensaje: "Fecha y hora manual invalida." };

    if (fecha > new Date())
        return { ok: false, mensaje: "Fecha y hora manual no puede ser futura." };

    if (ultimoMovimiento?.fechaHora) {
        const ultima = new Date(ultimoMovimiento.fechaHora);
        if (!Number.isNaN(ultima.getTime()) && fecha > ultima) {
            return {
                ok: true,
                advertencia: "La fecha manual es posterior al ultimo movimiento. Verifica si es correcto."
            };
        }
    }

    return { ok: true };
}

function validarFormulario() {
    const dni = normalizarDni(dniInput.value);
    if (!/^\d{8}$/.test(dni))
        return { ok: false, mensaje: "DNI debe tener 8 digitos." };

    if (dniExiste === false) {
        if (!nombresInput.value.trim() || !apellidosInput.value.trim())
            return { ok: false, mensaje: "Debe completar nombres y apellidos para un DNI nuevo." };
    }

    if (!guardiaUsuarioIdInput.value) {
        return { ok: false, mensaje: "Debe seleccionar un guardia de la lista." };
    }

    const fechaRes = validarFechaHoraManual();
    if (!fechaRes.ok) return { ok: false, mensaje: fechaRes.mensaje };

    const jsonOk = validateJson();
    if (!jsonOk) return { ok: false, mensaje: "JSON invalido o incompleto." };

    if (fechaRes.advertencia) {
        const seguir = confirm(`${fechaRes.advertencia}\n\n¿Deseas continuar?`);
        if (!seguir) return { ok: false, mensaje: "Operacion cancelada." };
    }

    return { ok: true };
}

function splitNombre(nombreCompleto) {
    const limpio = (nombreCompleto || "").trim();
    if (!limpio) return { nombres: "", apellidos: "" };
    const partes = limpio.split(/\s+/);
    if (partes.length <= 1) return { nombres: limpio, apellidos: "" };
    return { nombres: partes.slice(0, -2).join(" ") || partes[0], apellidos: partes.slice(-2).join(" ") };
}

async function validarDni() {
    const dni = normalizarDni(dniInput.value);
    dniInput.value = dni;
    dniExiste = null;
    ultimoMovimiento = null;

    if (!/^\d{8}$/.test(dni)) {
        setNamesLocked(false);
        setDniHint("DNI debe tener 8 digitos.", true);
        return;
    }

    const resp = await fetchAuth(`${API_BASE}/personas/${dni}`);
    if (!resp) return;

    if (resp.ok) {
        const persona = await resp.json();
        const partes = splitNombre(persona.nombre);
        nombresInput.value = partes.nombres;
        apellidosInput.value = partes.apellidos;
        setNamesLocked(true);
        dniExiste = true;
        setDniHint("DNI encontrado. Nombre bloqueado desde Personas.");
        await cargarUltimoMovimiento(dni);
    } else if (resp.status === 404) {
        nombresInput.value = "";
        apellidosInput.value = "";
        setNamesLocked(false);
        dniExiste = false;
        setDniHint("DNI no registrado. Debe completar nombres y apellidos.", true);
        await cargarUltimoMovimiento(dni);
    } else {
        dniExiste = null;
        const mensaje = await readApiError(resp);
        setDniHint(mensaje, true);
    }
}

async function buscarDniSugerencias() {
    const dni = normalizarDni(dniInput.value);
    dniInput.value = dni;

    if (dni.length < 3) {
        dniSuggestions.innerHTML = "";
        return;
    }

    const resp = await fetchAuth(`${API_BASE}/personas/buscar?dni=${dni}`);
    if (!resp || !resp.ok) return;
    const personas = await resp.json();
    dniSuggestions.innerHTML = personas
        .map((p) => `<option value="${p.dni}">${p.nombre}</option>`)
        .join("");
}

tipoOperacionInput.addEventListener("change", refreshTemplate);
dniInput.addEventListener("blur", validarDni);
dniInput.addEventListener("input", () => {
    clearTimeout(debounceDni);
    debounceDni = setTimeout(buscarDniSugerencias, 250);
});
datosJsonInput.addEventListener("input", () => {
    syncJsonToPersonalLocalInputs();
    syncJsonToSimple();
});
btnResetTemplate.addEventListener("click", refreshTemplate);
btnFormatJson.addEventListener("click", formatJson);
btnValidateJson.addEventListener("click", validateJson);
btnCopyJson.addEventListener("click", copyJson);
modoEdicionRadios.forEach((radio) => {
    radio.addEventListener("change", (e) => setModoEdicion(e.target.value));
});

Object.values(plFields).forEach(field => {
    field.addEventListener("change", syncPersonalLocalInputsToJson);
});

document.getElementById("formManual").addEventListener("submit", async (e) => {
    e.preventDefault();

    const validacion = validarFormulario();
    if (!validacion.ok) {
        document.getElementById("response").innerText = validacion.mensaje || "No se pudo validar.";
        return;
    }

    const fechaHoraManual = document.getElementById("fechaHoraManual").value;
    const parsed = tryParseJson();
    if (!parsed.ok) {
        document.getElementById("response").innerText = "JSON invalido en Datos JSON.";
        setJsonStatus("JSON invalido. Corrige antes de enviar.", true);
        return;
    }

    const payload = {
        tipoOperacion: tipoOperacionInput.value,
        tipoMovimiento: tipoMovimientoInput.value,
        guardiaUsuarioId: guardiaUsuarioIdInput.value ? Number(guardiaUsuarioIdInput.value) : null,
        dni: normalizarDni(dniInput.value),
        nombres: nombresInput.value.trim() || null,
        apellidos: apellidosInput.value.trim() || null,
        fechaHoraManual: `${fechaHoraManual}:00`,
        datos: parsed.data,
        observacion: document.getElementById("observacion").value.trim() || null
    };

    const response = await fetchAuth(`${API_BASE}/salidas/modo-tecnico`, {
        method: "POST",
        body: JSON.stringify(payload)
    });

    if (!response) return;
    const result = await response.json().catch(() => ({}));

    if (!response.ok) {
        const mensaje = await readApiError(response);
        document.getElementById("response").innerText = mensaje;
        return;
    }

    document.getElementById("response").innerText = JSON.stringify(result, null, 2);
});

refreshTemplate();
setDefaultFechaHora();
setModoEdicion("simple");
cargarGuardiasModoTecnico();
</script>
