<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cancha - Control de Accesos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<div class="main-content">
    <div class="container">
        <div class="page-header">
            <h2>⚽ Cuaderno de Cancha</h2>
            <div class="header-actions">
                <a href="../../index.html">
                    <button class="btn-inline btn-secondary"><img src="/images/arrow-left.svg" class="icon-white"> Volver al Menú</button>
                </a>
                <a href="cancha_historial.html">
                    <button class="btn-inline btn-secondary"><img src="/images/book.svg" class="icon-white"> Ver historial</button>
                </a>
            </div>
        </div>

        <hr>

        <div class="form-card">
            <h3>Registrar reserva de cancha</h3>

            <label>DNI *</label>
            <input type="text" id="dni" placeholder="Ingrese DNI" maxlength="8">

            <div id="persona-info" class="info-box" style="display: none; margin: 10px 0; padding: 10px; background: #e3f2fd; border-left: 4px solid #2196F3;">
                <strong><img src="/images/info-circle.svg"> Persona encontrada:</strong> <span id="persona-nombre"></span>
            </div>

            <label>Nombre completo</label>
            <input type="text" id="nombrePersona" placeholder="Se completa con el DNI" disabled>

            <div class="form-row">
                <div class="form-group">
                    <label>Fecha *</label>
                    <input type="date" id="fecha">
                </div>
                <div class="form-group">
                    <label>Hora *</label>
                    <input type="time" id="hora">
                </div>
                <div class="form-group">
                    <label>Categoria *</label>
                    <select id="categoria">
                        <option value="">Seleccione...</option>
                        <option value="Futbol">Futbol</option>
                        <option value="Voley">Voley</option>
                        <option value="Libre">Libre</option>
                    </select>
                </div>
            </div>

            <hr>

            <div class="toolbar">
                <h3>Equipo A</h3>
                <button type="button" class="btn-inline btn-small" onclick="agregarIntegrante('A')">
                    <img src="/images/plus-lg.svg" class="icon-white"> Agregar integrante
                </button>
            </div>
            <div id="equipoA-container"></div>

            <hr>

            <div class="toolbar">
                <h3>Equipo B</h3>
                <button type="button" class="btn-inline btn-small" onclick="agregarIntegrante('B')">
                    <img src="/images/plus-lg.svg" class="icon-white"> Agregar integrante
                </button>
            </div>
            <div id="equipoB-container"></div>

            <div style="margin-top: 10px;">
                <button type="button" class="btn-success btn-block" onclick="registrarCancha()">
                    <img src="/images/check-lg.svg" class="icon-white"> Guardar reserva
                </button>
            </div>

            <p id="mensaje"></p>
        </div>

        <hr>

        <div>
            <div class="toolbar">
                <h3>Reservas activas</h3>
                <button type="button" class="btn-inline btn-small" onclick="cargarRegistrosActivos()">
                    <img src="/images/arrow-clockwise.svg" class="icon-white"> Actualizar
                </button>
            </div>
            <div id="tabla-registros">
                <p class="text-center muted">Cargando...</p>
            </div>
        </div>
    </div>
</div>

<script src="../../js/sidebar.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/auth.js"></script>
<script src="../js/cancha.js"></script>
</body>
</html>
