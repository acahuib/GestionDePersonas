<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuaderno de Asistencia Personal de Mina - Control de Accesos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<div class="main-content">
    <div class="container">
        <div class="page-header">
            <h2>👷 Cuaderno de Asistencia Personal de Mina</h2>
            <div class="header-actions">
                <a href="../../index.html">
                    <button class="btn-inline btn-secondary"><img src="/images/arrow-left.svg" class="icon-white"> Volver al Menú</button>
                </a>
                <a href="personal_local_retornando.html">
                    <button class="btn-inline btn-warning"><img src="/images/arrow-clockwise.svg" class="icon-white"> Ir a Retornando</button>
                </a>
                <a href="personal_local_historial.html">
                    <button class="btn-inline btn-secondary"><img src="/images/book.svg" class="icon-white"> Ver historial</button>
                </a>
            </div>
        </div>

        <hr>

    <!-- Formulario de ingreso (mañana) -->
        <div class="form-card">
            <h3>Registrar Ingreso de Asistencia Personal de Mina</h3>
            <p class="muted" style="margin-top: 8px;">Modo escaner: lea DNI y registre. Nombre, fecha y hora se completan automaticamente.</p>
            <p class="muted" style="margin-top: 6px;">Fecha/Hora actual: <strong id="fecha-hora-actual"></strong></p>
            
            <form id="form-ingreso" onsubmit="event.preventDefault(); registrarIngreso();">
                <div class="form-row">
                    <div class="form-group">
                        <label for="dni">DNI: (*)</label>
                        <input 
                            type="text" 
                            id="dni" 
                            maxlength="8" 
                            required 
                            placeholder="12345678"
                            onblur="buscarPersonaPorDni()"
                            onkeypress="if(event.key==='Enter'){event.preventDefault(); buscarPersonaPorDni();}">
                        <div id="persona-info" style="display:none; margin-top: 5px; padding: 8px; background: #d4edda; border-radius: 4px; color: #155724;">
                            <img src="/images/check-circle.svg"> Persona registrada: <strong id="persona-nombre"></strong>
                        </div>
                    </div>

                    <div class="form-group" id="grupo-nombre-manual" style="display:none;">
                        <label for="nombreApellidos">Nombre y Apellidos:</label>
                        <input 
                            type="text" 
                            id="nombreApellidos" 
                            placeholder="Solo si DNI no esta registrado"
                            onkeypress="if(event.key==='Enter'){event.preventDefault(); registrarIngreso();}">
                    </div>
                </div>

                <div class="form-group" style="display:none;">
                    <label for="horaIngreso">Hora de Ingreso:</label>
                    <input type="date" id="fechaIngreso" placeholder="Fecha de ingreso">
                    <input 
                        type="time" 
                        id="horaIngreso" 
                        placeholder="Dejar vacío para usar hora actual">
                </div>

                <div id="mensaje" class="message"></div>

                <button type="submit" class="btn-primary"><img src="/images/check-circle.svg" class="icon-white"> Registrar INGRESO</button>
            </form>
        </div>

        <hr>

        <!-- Lista de personal activo (con ingreso, sin salida final) -->
        <div class="table-card">
            <div class="table-header">
                <h3>Asistencia Personal de Mina Activo (Sin salida final)</h3>
                <button onclick="cargarActivos()" class="btn-secondary btn-small"><img src="/images/arrow-clockwise.svg" class="icon-white"> Actualizar</button>
            </div>
            <div id="lista-activos">
                <p class="text-center">Cargando...</p>
            </div>
        </div>

    </div>
</div>

<script src="../../js/sidebar.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/activos_buscador.js"></script>
<script src="../../js/personas_autocomplete.js"></script>
<script src="../js/personal_local_cierre.js"></script>
<script src="../js/edicion_asistencia.js"></script>
<script src="../js/personal_local.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    verificarAutenticacion();
    cargarActivos();

    // Auto-refresh si viene con parámetro
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('refresh') === '1') {
        setTimeout(() => {
            cargarActivos();
        }, 500);
    }

    habilitarAutocompletePersona({
        dniId: "dni",
        nombreId: "nombreApellidos"
    });
});
</script>

</body>
</html>
