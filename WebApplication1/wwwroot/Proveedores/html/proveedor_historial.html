<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial - Proveedores</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<div class="main-content">
    <div class="container">
        <div class="page-header">
            <h2><img src="/images/book.svg" class="icon-white"> Historial de Proveedores (Sin Vehiculo)</h2>
            <div class="header-actions">
                <a href="proveedor.html">
                    <button class="btn-inline btn-secondary"><img src="/images/arrow-left.svg" class="icon-white"> Volver al Cuaderno</button>
                </a>
            </div>
        </div>

        <hr>

        <div class="form-card" data-cuaderno-historial data-tipo="Proveedor" data-historial-vista="entradas-salidas">
            <div class="toolbar">
                <h3>Historial completo</h3>
                <button type="button" class="btn-inline btn-small" data-historial-recargar>
                    <img src="/images/arrow-clockwise.svg" class="icon-white"> Actualizar
                </button>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Busqueda</label>
                    <input type="text" data-historial-texto placeholder="DNI, nombre o dato">
                </div>
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" data-historial-fecha>
                </div>
                <div class="form-group" style="display:flex; gap:8px; align-items:flex-end;">
                    <button type="button" class="btn-inline btn-small" data-historial-buscar>Buscar</button>
                    <button type="button" class="btn-inline btn-small" data-historial-limpiar>Limpiar</button>
                </div>
            </div>

            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>DNI</th>
                            <th>Nombre</th>
                            <th>Ingreso</th>
                            <th>Guardia Ingreso</th>
                            <th>Salida</th>
                            <th>Guardia Salida</th>
                            <th>Movimientos internos</th>
                            <th>Detalle</th>
                        </tr>
                    </thead>
                    <tbody data-historial-body>
                        <tr><td colspan="8">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
            <p class="muted" data-historial-resumen></p>
        </div>
    </div>
</div>

<script src="../../js/sidebar.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/cuaderno_historial.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    verificarAutenticacion();
});
</script>

</body>
</html>
