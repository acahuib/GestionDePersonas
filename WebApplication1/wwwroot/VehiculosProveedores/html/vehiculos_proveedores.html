<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuaderno Vehículos Proveedores - Control de Accesos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<div class="main-content">
    <div class="container">
        <div class="page-header">
            <h2>🚚 Cuaderno de Vehículos Proveedores</h2>
            <div class="header-actions">
                <a href="../../index.html">
                    <button class="btn-inline btn-secondary"><img src="/images/arrow-left.svg" class="icon-white"> Volver al Menú</button>
                </a>
                <a href="vehiculos_proveedores_historial.html">
                    <button class="btn-inline btn-secondary"><img src="/images/book.svg" class="icon-white"> Ver historial</button>
                </a>
            </div>
        </div>

        <hr>

    <!-- FORMULARIO DE REGISTRO -->
    <div class="form-card">
        <h3>Registrar Entrada</h3>

        <label>DNI *</label>
        <input type="text" id="dni" placeholder="Ingrese DNI del conductor" maxlength="8">

        <label>Placa *</label>
        <input type="text" id="placa" placeholder="Placa del vehiculo">

        <label>Nombre y Apellidos <span class="muted">(Opcional si DNI ya está registrado)</span></label>
        <input type="text" id="nombreCompleto" placeholder="Nombre completo del conductor">

        <div id="persona-info" class="info-box" style="display: none; margin: 10px 0; padding: 10px; background: #e3f2fd; border-left: 4px solid #2196F3;">
            <strong><img src="/images/info-circle.svg"> Persona encontrada:</strong> <span id="persona-nombre"></span>
        </div>

        <label>Trae *</label>
        <input type="text" id="tipo" placeholder="Trae">

        <label>Cantidad *</label>
        <input type="text" id="cantidad" placeholder="Cantidad">

        <label>Lote *</label>
        <input type="text" id="lote" placeholder="Numero de lote">

        <label>Procedencia *</label>
        <input type="text" id="procedencia" placeholder="Procedencia">

        <label>Proveedor/Empresa *</label>
        <input type="text" id="proveedor" placeholder="Empresa o proveedor">

        <label>Observación</label>
        <textarea id="observacion" placeholder="Observación (opcional)" rows="4"></textarea>

        <label>Hora de Ingreso</label>
        <input type="date" id="fechaIngreso" placeholder="Fecha de ingreso">
        <input type="time" id="horaIngreso" placeholder="Dejar vacio para usar hora actual">

        <div>
            <button onclick="registrarEntrada()" class="btn-success btn-block">
                <img src="/images/check-circle.svg" class="icon-white"> Registrar ENTRADA
            </button>
        </div>

        <p id="mensaje"></p>
    </div>

    <!-- LISTA DE VEHÍCULOS ACTIVOS -->
    <div>
        <div class="toolbar">
            <h3>Vehículos Activos (Sin salida)</h3>
            <button onclick="cargarActivos()" class="btn-inline btn-small"><img src="/images/arrow-clockwise.svg" class="icon-white"> Actualizar</button>
        </div>
        
        <div id="lista-activos">
            <p class="text-center muted">Cargando...</p>
        </div>
    </div>

</div>

<script src="../../js/sidebar.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/activos_buscador.js"></script>
<script src="../../js/personas_autocomplete.js"></script>
<script src="../js/vehiculos_proveedores.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    verificarAutenticacion();
    const hoy = (typeof fechaLocalIso === "function") ? fechaLocalIso() : new Date().toISOString().split("T")[0];
    const fechaIngreso = document.getElementById("fechaIngreso");
    if (fechaIngreso) fechaIngreso.value = hoy;
    cargarActivos();

    // Auto-actualizar lista cada 15 segundos
    setInterval(cargarActivos, 15000);

    // Si venimos de registrar salida, limpiar query y refrescar
    const params = new URLSearchParams(window.location.search);
    if (params.get("refresh") === "1") {
        cargarActivos();
        window.history.replaceState({}, document.title, "vehiculos_proveedores.html");
    }

    // Detectar ENTER y BLUR en el campo DNI
    const dniInput = document.getElementById("dni");
    dniInput.addEventListener("blur", buscarPersonaPorDni);
    dniInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            buscarPersonaPorDni();
        }
    });
    
    addEnterListener("placa", () => document.getElementById("nombreCompleto").focus());
    addEnterListener("nombreCompleto", () => document.getElementById("tipo").focus());
    addEnterListener("tipo", () => document.getElementById("cantidad").focus());
    addEnterListener("cantidad", () => document.getElementById("lote").focus());
    addEnterListener("lote", () => document.getElementById("procedencia").focus());
    addEnterListener("procedencia", () => document.getElementById("proveedor").focus());
    addEnterListener("proveedor", registrarEntrada);

    habilitarAutocompletePersona({
        dniId: "dni",
        nombreId: "nombreCompleto"
    });
});
</script>

</body>
</html>
